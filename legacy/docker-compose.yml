# docker-compose.yml — desenvolvimento local
# Em produção (Coolify) use apenas o Dockerfile.
# O Coolify provisiona o Postgres como add-on separado.

services:
  api:
    build:
      context: ..
      target: runtime
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://koalla:koalla@db:5432/koalla}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o-mini}
      OPENAI_FORMATTING_MODEL: ${OPENAI_FORMATTING_MODEL:-gpt-4.1-mini}
      CHATWOOT_URL: ${CHATWOOT_URL:-https://chatwoot.koalla.ai}
      CHATWOOT_API_TOKEN: ${CHATWOOT_API_TOKEN:-}
      CHATWOOT_ACCOUNT_ID: ${CHATWOOT_ACCOUNT_ID:-1}
      ASAAS_URL: ${ASAAS_URL:-https://api-sandbox.asaas.com}
      ASAAS_API_KEY: ${ASAAS_API_KEY:-}
      MESSAGE_QUEUE_WAIT_SECONDS: ${MESSAGE_QUEUE_WAIT_SECONDS:-0.1}
      AGENT_MAX_ITERATIONS: ${AGENT_MAX_ITERATIONS:-10}
      MEMORY_WINDOW_LENGTH: ${MEMORY_WINDOW_LENGTH:-100}
      CHARGE_VALUE: ${CHARGE_VALUE:-500.0}
      CHARGE_DURATION_MINUTES: ${CHARGE_DURATION_MINUTES:-30}
      ALERT_CONVERSATION_ID: ${ALERT_CONVERSATION_ID:-}
      WORKERS: "1"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    develop:
      watch:
        - action: sync+restart
          path: app
          target: /app/app

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: koalla
      POSTGRES_PASSWORD: koalla
      POSTGRES_DB: koalla
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U koalla"]
      interval: 5s
      timeout: 5s
      retries: 5
    ports:
      - "5432:5432"

volumes:
  postgres_data:
