name: on-prs

on:
  pull_request:
    types: [opened, synchronize, reopened]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  checks: write
  pull-requests: write  # needed for jacoco PR comment

jobs:
  test:
    uses: ./.github/workflows/test.yml

  build-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'

      # Verify the project compiles and bootJar succeeds (no push)
      - name: Build JAR
        run: ./gradlew bootJar --no-daemon -x test
