# Production compose — used on the VPS.
# The API image is pulled from ghcr.io (built by CI), not built locally.
# Usage: docker compose -f docker-compose.prod.yml up -d
#
# Required .env file in the same directory with:
#   GITHUB_OWNER=<your-github-username>
#   DATABASE_URL=jdbc:postgresql://db:5432/koalla
#   DB_USERNAME=koalla
#   DB_PASSWORD=<strong-password>
#   OPENAI_API_KEY=sk-...
#   CHATWOOT_API_TOKEN=...
#   CHATWOOT_WEBHOOK_SECRET=...
#   ASAAS_API_KEY=...
#   ASAAS_WEBHOOK_TOKEN=...

version: '3.8'

services:
  api:
    image: ghcr.io/${GITHUB_OWNER}/koalla-core:latest
    ports:
      - "8080:8080"
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - DB_USERNAME=${DB_USERNAME}
      - DB_PASSWORD=${DB_PASSWORD}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - CHATWOOT_API_TOKEN=${CHATWOOT_API_TOKEN}
      - CHATWOOT_WEBHOOK_SECRET=${CHATWOOT_WEBHOOK_SECRET}
      - ASAAS_API_KEY=${ASAAS_API_KEY}
      - ASAAS_WEBHOOK_TOKEN=${ASAAS_WEBHOOK_TOKEN}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - koalla-network
    restart: unless-stopped

  db:
    image: pgvector/pgvector:pg16
    environment:
      - POSTGRES_USER=${DB_USERNAME}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - POSTGRES_DB=koalla
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME} -d koalla"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - koalla-network
    restart: unless-stopped

volumes:
  postgres_data:

networks:
  koalla-network:
    driver: bridge
