spring:
  config:
    activate:
      on-profile: test

  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect

  ai:
    openai:
      api-key: test-key
      chat:
        options:
          model: gpt-4o-mini

koalla:
  chatwoot:
    api-token: test-token
    webhook-secret: test-secret
  asaas:
    api-key: test-key

