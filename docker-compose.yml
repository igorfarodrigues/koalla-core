version: '3.8'

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      - DATABASE_URL=jdbc:postgresql://db:5432/koalla
      - DB_USERNAME=koalla
      - DB_PASSWORD=koalla
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - CHATWOOT_API_TOKEN=${CHATWOOT_API_TOKEN}
      - CHATWOOT_WEBHOOK_SECRET=${CHATWOOT_WEBHOOK_SECRET}
      - ASAAS_API_KEY=${ASAAS_API_KEY}
      - ASAAS_WEBHOOK_TOKEN=${ASAAS_WEBHOOK_TOKEN}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - koalla-network
    restart: unless-stopped

  db:
    image: pgvector/pgvector:pg16
    environment:
      - POSTGRES_USER=koalla
      - POSTGRES_PASSWORD=koalla
      - POSTGRES_DB=koalla
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U koalla -d koalla"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - koalla-network
    restart: unless-stopped

volumes:
  postgres_data:

networks:
  koalla-network:
    driver: bridge

